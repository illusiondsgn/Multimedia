<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Multimedia</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for modern UI icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen p-6">

    <div class="max-w-7xl mx-auto space-y-6">

        <!-- Header -->
        <header class="flex justify-between items-center border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Dashboard Multimedia</h1>
                <p class="text-sm text-gray-400">Resumen de Indicadores Clave de Rendimiento (KPIs)</p>
            </div>
            <div class="bg-gray-800 px-4 py-2 rounded-lg text-sm font-medium text-gray-300 flex items-center gap-2">
                <i data-lucide="calendar" class="w-4 h-4 text-indigo-400"></i> Vista Mensual
            </div>
        </header>

        <!-- Top Section: KPIs Grid -->
        <section>
            <h2 class="text-lg font-semibold mb-3 flex items-center gap-2">
                <i data-lucide="bar-chart-3" class="w-5 h-5 text-indigo-400"></i> Indicadores Clave de Rendimiento (KPIs)
            </h2>
            <p class="text-[11px] text-gray-500 mb-3 italic">Edita cualquier número (valor o meta) directamente en la tarjeta — el semáforo de color se recalcula solo.</p>
            <div id="kpi-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- Las tarjetas de KPI se generan automáticamente con JS, ver KPI_CONFIG abajo -->
            </div>
        </section>

    </div>

    <script>
        lucide.createIcons();
    </script>

    <!-- ============================================================
         ZONA DE CONFIGURACIÓN — edita aquí los valores por defecto.
         Los colores de semáforo se calculan solos con base en
         "meta" y "direccion" (o "invertido") — NO los edites a mano.
         ============================================================ -->
    <script>

        // ---- 1) KPIs -------------------------------------------------
        // direccion: 'mayor'  -> más alto es mejor (ej. Desempeño)
        //            'menor'  -> más bajo es mejor (ej. Retraso)
        // margenAtencion: qué tan lejos de la meta todavía se considera
        //   "Atención" (amarillo) antes de pasar a "Acción Inmediata" (rojo).
        //   Ej: direccion 'mayor', margenAtencion 0.95 => si el valor cae
        //   por debajo del 95% de la meta, ya es rojo.
        //   Ej: direccion 'menor', margenAtencion 1.5  => si el valor supera
        //   1.5x la meta, ya es rojo.
        const KPI_CONFIG = [
            { id: 'tareas',       label: 'Tareas',           tipo: 'auto', valor: 85,   meta: 84, unidad: '',  direccion: 'mayor', margenAtencion: 0.95, formato: 'fraccion' },
            { id: 'desempeno',    label: 'Desempeño',        tipo: 'auto', valor: 99,   meta: 95, unidad: '%', direccion: 'mayor', margenAtencion: 0.95, formato: 'debajo' },
            { id: 'entiempo',     label: 'En Tiempo',        tipo: 'auto', valor: 94,   meta: 90, unidad: '%', direccion: 'mayor', margenAtencion: 0.95, formato: 'debajo' },
            { id: 'retraso',      label: 'Retraso',          tipo: 'auto', valor: 4,    meta: 2,  unidad: '',  direccion: 'menor', margenAtencion: 1.5,  formato: 'debajo', metaPrefijo: '<' },
            { id: 'revisiones',   label: 'Prom. Revisiones', tipo: 'auto', valor: 2,    meta: 2,  unidad: '',  direccion: 'menor', margenAtencion: 1.5,  formato: 'debajo', metaPrefijo: '≤' },
            { id: 'satisfaccion', label: 'Satisfacción',     tipo: 'manual', estado: 'optimo', textoValor: 'Sin datos', textoSub: 'Pendiente' },
            { id: 'urgencias',    label: 'Urgencias',        tipo: 'auto', valor: 2,    meta: 5,  unidad: '',  direccion: 'menor', margenAtencion: 1.5,  formato: 'fraccion' },
        ];

        // ============================================================
        // MOTOR — no necesitas tocar nada de aquí para abajo.
        // ============================================================

        const ESTADOS = {
            optimo:  { color: 'emerald', texto: 'Óptimo' },
            atencion:{ color: 'amber',   texto: 'Atención' },
            accion:  { color: 'rose',    texto: 'Acción Inmediata' },
        };

        function calcularEstadoKPI(cfg) {
            if (cfg.tipo === 'manual') return cfg.estado;
            const { valor, meta, direccion, margenAtencion } = cfg;
            if (direccion === 'mayor') {
                if (valor >= meta) return 'optimo';
                if (valor >= meta * margenAtencion) return 'atencion';
                return 'accion';
            } else {
                if (valor <= meta) return 'optimo';
                if (valor <= meta * margenAtencion) return 'atencion';
                return 'accion';
            }
        }

        function renderKPICard(cfg) {
            const estadoKey = calcularEstadoKPI(cfg);
            const { color, texto } = ESTADOS[estadoKey];

            if (cfg.tipo === 'manual') {
                return `
                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex flex-col justify-between">
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">${cfg.label}</span>
                    <div class="my-2">
                        <div class="text-xl text-gray-400 italic">${cfg.textoValor}</div>
                        <div class="text-xs text-gray-500">${cfg.textoSub}</div>
                    </div>
                    <span class="inline-flex items-center gap-1.5 text-xs font-medium text-${color}-400">
                        <span class="h-2 w-2 rounded-full bg-${color}-400"></span> ${texto}
                    </span>
                </div>`;
            }

            const metaTexto = (cfg.metaPrefijo || '') + cfg.meta;
            const unidadValor = cfg.unidad ? `<span class="ml-1.5">${cfg.unidad}</span>` : '';
            const unidadMeta = cfg.unidad ? `<span class="ml-1">${cfg.unidad}</span>` : '';
            let valorHTML;
            if (cfg.formato === 'fraccion') {
                valorHTML = `
                    <div id="valuewrap-${cfg.id}" class="text-2xl font-bold">
                        <input type="number" step="1" value="${Math.round(cfg.valor)}" data-kpi="${cfg.id}" data-campo="valor"
                            class="kpi-input bg-gray-700/40 rounded w-16 text-right px-1 focus:outline-none focus:ring-1 focus:ring-indigo-400" />${unidadValor}
                        <span class="text-xs font-normal text-gray-400 ml-1.5">/
                            <input type="number" step="1" value="${Math.round(cfg.meta)}" data-kpi="${cfg.id}" data-campo="meta"
                                class="kpi-input bg-transparent w-10 text-gray-400 focus:outline-none border-b border-dashed border-gray-600 focus:border-indigo-400" /> Meta
                        </span>
                    </div>`;
            } else {
                valorHTML = `
                    <div id="valuewrap-${cfg.id}" class="text-2xl font-bold text-${color}-400">
                        <input type="number" step="1" value="${Math.round(cfg.valor)}" data-kpi="${cfg.id}" data-campo="valor"
                            class="kpi-input bg-transparent w-16 focus:outline-none border-b border-dashed border-gray-600 focus:border-indigo-400" />${unidadValor}
                    </div>
                    <div class="text-xs text-gray-400 mt-1">Meta: ${cfg.metaPrefijo || ''}
                        <input type="number" step="1" value="${Math.round(cfg.meta)}" data-kpi="${cfg.id}" data-campo="meta"
                            class="kpi-input bg-transparent w-10 text-gray-400 focus:outline-none border-b border-dashed border-gray-600 focus:border-indigo-400" />${unidadMeta}
                    </div>`;
            }

            return `
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex flex-col justify-between" id="card-${cfg.id}">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">${cfg.label}</span>
                <div class="my-2">${valorHTML}</div>
                <span id="status-${cfg.id}" class="inline-flex items-center gap-1.5 text-xs font-medium text-${color}-400">
                    <span class="h-2 w-2 rounded-full bg-${color}-400"></span> ${texto}
                </span>
            </div>`;
        }

        function actualizarKPICard(id) {
            const cfg = KPI_CONFIG.find(k => k.id === id);
            if (!cfg || cfg.tipo === 'manual') return;
            const estadoKey = calcularEstadoKPI(cfg);
            const { color, texto } = ESTADOS[estadoKey];

            const statusEl = document.getElementById(`status-${id}`);
            if (statusEl) {
                statusEl.className = `inline-flex items-center gap-1.5 text-xs font-medium text-${color}-400`;
                statusEl.innerHTML = `<span class="h-2 w-2 rounded-full bg-${color}-400"></span> ${texto}`;
            }
            if (cfg.formato === 'debajo') {
                const valueWrap = document.getElementById(`valuewrap-${id}`);
                if (valueWrap) {
                    valueWrap.className = `text-2xl font-bold text-${color}-400`;
                }
            }
        }

        function renderKPIGrid() {
            const grid = document.getElementById('kpi-grid');
            grid.innerHTML = KPI_CONFIG.map(renderKPICard).join('');
        }

        // Delegación de eventos: escucha cambios en los inputs sin
        // perder el foco al escribir (solo se actualizan colores/textos).
        document.getElementById('kpi-grid').addEventListener('input', (e) => {
            if (!e.target.matches('.kpi-input')) return;
            const id = e.target.dataset.kpi;
            const campo = e.target.dataset.campo;
            const cfg = KPI_CONFIG.find(k => k.id === id);
            const val = parseFloat(e.target.value);
            if (cfg && !isNaN(val)) {
                cfg[campo] = val;
                actualizarKPICard(id);
            }
        });

        renderKPIGrid();
    </script>
</body>
</html>
